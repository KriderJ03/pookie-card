<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="A hand-drawn romantic security-gauntlet card for a computer science girlfriend."
    />
    <title>Pookie Card</title>
    <link rel="preload" href="assets/handdrawn/envelope-back.png" as="image" />
    <link rel="preload" href="assets/handdrawn/envelope-front-closed.png" as="image" />
    <link
      rel="preload"
      href="assets/handdrawn/envelope-front-slight-open.png"
      as="image"
    />
    <link rel="preload" href="assets/handdrawn/login-menu-panel-v2.png" as="image" />
    <link
      rel="preload"
      href="assets/handdrawn/metal-door-closed-no-heart.png?v=door-7"
      as="image"
    />
    <link
      rel="preload"
      href="assets/handdrawn/metal-door-heart-lock.png?v=door-7"
      as="image"
    />
    <link rel="preload" href="assets/handdrawn/security-tape-roll-v2.png" as="image" />
    <link rel="preload" href="assets/handdrawn/security-tape-strip-v2.png" as="image" />
    <link rel="preload" href="assets/handdrawn/captcha-cutie-grid-only.png" as="image" />
    <link rel="preload" href="assets/handdrawn/final-card-open-01.png?v=final-3" as="image" />
    <link rel="preload" href="assets/handdrawn/final-card-open-13.png?v=final-3" as="image" />
    <link rel="preload" href="assets/final-slideshow/slide-001.jpg?v=slideshow-1" as="image" />
    <link rel="preload" href="assets/final-slideshow/slide-044.jpg?v=slideshow-1" as="image" />
    <link rel="preload" href="assets/audio/how-much-longer.mp3?v=audio-1" as="audio" type="audio/mpeg" />
    <link rel="preload" href="assets/audio/windows-default.wav?v=audio-1" as="audio" type="audio/wav" />
    <link rel="preload" href="assets/audio/sliding-metal-door-sfx.mp3?v=audio-2" as="audio" type="audio/mpeg" />
    <link rel="preload" href="assets/audio/incorrect-boop-bass.wav?v=audio-4" as="audio" type="audio/wav" />
    <link rel="preload" href="assets/audio/mouse-click.wav?v=audio-4" as="audio" type="audio/wav" />
    <link rel="preload" href="assets/audio/packing-tape-roll-a.mp3?v=audio-3" as="audio" type="audio/mpeg" />
    <link rel="preload" href="assets/audio/packing-tape-roll-b.mp3?v=audio-3" as="audio" type="audio/mpeg" />
    <link rel="stylesheet" href="styles.css?v=audio-track-5" />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"
    ></script>
    <script defer src="script.js?v=audio-track-5"></script>
  </head>
  <body>
    <main class="app-shell" aria-live="polite">
      <section class="stage stage-cover is-active" data-stage="cover">
        <div class="envelope-scene" id="envelopeScene">
          <button
            class="envelope-face envelope-back"
            id="flipEnvelope"
            type="button"
            aria-label="Flip the envelope over"
          >
            <img
              class="envelope-art"
              src="assets/handdrawn/envelope-back.png"
              alt="A hand-painted pink envelope addressed to Gaya"
            />
          </button>

          <div class="envelope-face envelope-front">
            <img
              class="envelope-art envelope-front-closed-art"
              src="assets/handdrawn/envelope-front-closed.png"
              alt="A hand-painted pink envelope with a gold heart"
            />
            <img
              class="envelope-art envelope-front-open-art"
              src="assets/handdrawn/envelope-front-slight-open.png"
              alt=""
              aria-hidden="true"
            />
            <button
              class="heart-hotspot"
              id="heartButton"
              type="button"
              aria-label="Press the gold heart"
            ></button>
          </div>
        </div>

        <div class="auth-overlay" aria-hidden="true"></div>

        <form class="login-panel" id="loginForm" autocomplete="off">
          <img
            class="login-menu-art"
            src="assets/handdrawn/login-menu-panel-v2.png"
            alt=""
            aria-hidden="true"
          />
          <div class="login-content">
            <h2 class="login-title">Log-in</h2>
            <label class="paint-field">
              <span>username</span>
              <input
                id="usernameInput"
                name="username"
                type="text"
                autocomplete="username"
                value="POOKI3"
              />
            </label>
            <label class="paint-field">
              <span>password</span>
              <input
                id="passwordInput"
                name="password"
                type="password"
                inputmode="text"
                autocomplete="current-password"
                placeholder="enter code"
              />
            </label>
            <button class="paint-button" type="submit">
              <span>unlock</span>
            </button>
            <p class="status-line" id="loginStatus"></p>
          </div>
        </form>

        <div class="door-system" id="doorSystem">
          <div class="metal-door metal-door-left" aria-hidden="true">
            <img
              class="metal-door-art"
              src="assets/handdrawn/metal-door-closed-no-heart.png?v=door-7"
              alt=""
            />
          </div>
          <div class="metal-door metal-door-right" aria-hidden="true">
            <img
              class="metal-door-art"
              src="assets/handdrawn/metal-door-closed-no-heart.png?v=door-7"
              alt=""
            />
          </div>
          <div class="metal-door-lock-carrier" aria-hidden="true">
            <img
              class="metal-door-lock-piece"
              src="assets/handdrawn/metal-door-heart-lock.png?v=door-7"
              alt=""
            />
          </div>
          <div class="security-tape-system" aria-hidden="true">
            <div class="tape-track tape-track-one">
              <span class="tape-line"></span>
              <img
                class="tape-roll"
                src="assets/handdrawn/security-tape-roll-v2.png"
                alt=""
              />
            </div>
            <div class="tape-track tape-track-two">
              <span class="tape-line"></span>
              <img
                class="tape-roll"
                src="assets/handdrawn/security-tape-roll-v2.png"
                alt=""
              />
            </div>
          </div>
          <div class="extra-tape-layer" id="extraTapeLayer" aria-hidden="true"></div>
          <div class="door-lock">ACCESS DENIED</div>
          <button class="lockdown-retry" id="retryLogin" type="button" hidden>
            Recover password
          </button>
          <section
            class="recovery-panel"
            id="recoveryPanel"
            aria-live="polite"
            hidden
          >
            <div class="recovery-card" id="recoveryContent"></div>
          </section>
        </div>
      </section>

      <section class="stage stage-quiz" data-stage="quiz">
        <div class="checkpoint">
          <div class="checkpoint-header">
            <p class="panel-kicker">backup verification</p>
            <span id="questionCount">1 / 3</span>
          </div>
          <h2 id="questionText"></h2>
          <form id="questionForm" class="answer-row" autocomplete="off">
            <input id="answerInput" name="answer" type="text" />
            <button class="primary-btn" type="submit">Submit</button>
          </form>
          <p class="status-line" id="questionStatus"></p>
        </div>
      </section>

      <section class="stage stage-captcha" data-stage="captcha">
        <div class="captcha-panel">
          <div class="checkpoint-header">
            <p class="panel-kicker">human-ish check</p>
            <span id="captchaCount">0 selected</span>
          </div>
          <h2>Select every photo with a pink heart.</h2>
          <div class="captcha-grid" id="captchaGrid"></div>
          <button class="primary-btn wide-btn" id="captchaSubmit" type="button">
            Verify
          </button>
          <p class="status-line" id="captchaStatus"></p>
        </div>
      </section>

      <section class="stage stage-two-factor" data-stage="two-factor">
        <div class="checkpoint two-factor-panel">
          <p class="panel-kicker">Password recovery</p>
          <h2>A recovery code was sent to your inbox</h2>
          <p class="soft-copy" id="twoFactorMessage"></p>
          <form id="twoFactorForm" class="answer-row code-row" autocomplete="off">
            <input
              id="codeInput"
              name="code"
              type="text"
              inputmode="numeric"
              maxlength="6"
              aria-label="Six digit code"
            />
            <button class="primary-btn" type="submit">Open</button>
          </form>
          <button class="secondary-btn" id="resendCode" type="button">Resend</button>
          <p class="status-line" id="twoFactorStatus"></p>
        </div>
      </section>

      <section class="stage stage-final" data-stage="final">
        <div class="final-slideshow" id="finalSlideshow" aria-hidden="true">
          <div class="final-slideshow-track" id="finalSlideshowTrack"></div>
        </div>
        <div class="final-card-stage" aria-label="A hand-painted card opens to reveal a note">
          <img
            class="final-card-frame"
            id="finalCardFrame"
            src="assets/handdrawn/final-card-open-01.png?v=final-3"
            alt="A hand-painted pink envelope opening to reveal a love note"
            draggable="false"
          />
        </div>
      </section>
    </main>
  </body>
</html>
